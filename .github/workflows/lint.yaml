# Codespell configuration is within .codespellrc
---
name: linting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    name: Lint and spellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: make .venv/ && make venv-dev
      - name: Check formatting
        run: . .venv/bin/activate && black --check . && isort --check --skip-gitignore .
      - name: Spellcheck
        run: . .venv/bin/activate && codespell
